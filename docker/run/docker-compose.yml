services:
  agent-zero:
    container_name: agent-zero
    # Build from local source (self-contained, no external base image).
    # Run from the repo root:  docker compose -f docker/run/docker-compose.yml up --build
    build:
      context: ../..
      dockerfile: Dockerfile
    image: johnlawal/agent-zero:v2.1.0
    restart: unless-stopped

    ports:
      - "${WEB_UI_PORT:-50080}:80"   # Agent Zero web UI
      - "${SSH_PORT:-50022}:22"      # SSH code execution (optional)

    volumes:
      # Named volumes for ALL persistent user data — survives container rebuilds
      # and image upgrades without data loss.
      - a0_knowledge:/a0/knowledge
      - a0_usr_knowledge:/a0/usr/knowledge
      - a0_skills:/a0/usr/skills
      - a0_projects:/a0/usr/projects
      - a0_agents:/a0/usr/agents
      - a0_logs:/a0/logs

    environment:
      # ── Web UI ────────────────────────────────────────────────────────────
      WEB_UI_PORT: "80"
      WEB_UI_HOST: "0.0.0.0"

      # ── Auth (leave blank to disable login prompt) ─────────────────────
      AUTH_LOGIN: "${AUTH_LOGIN:-}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-}"

      # ── Flask ──────────────────────────────────────────────────────────
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:-}"

      # ── Misc ──────────────────────────────────────────────────────────
      TOKENIZERS_PARALLELISM: "false"
      TZ: "UTC"

    # Optional: resource limits to prevent OOM
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4g

volumes:
  a0_knowledge:
  a0_usr_knowledge:
  a0_skills:
  a0_projects:
  a0_agents:
  a0_logs:
